<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Quiz - 10 Categories</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --card-bg: #131a26;
            --accent-pink: #ff2a74;
            --accent-blue: #00f0ff;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --correct: #00ff87;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .quiz-container {
            background-color: var(--card-bg);
            border: 2px solid #1e293b;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            padding: 30px;
            width: 100%;
            max-width: 650px;
            text-align: center;
            position: relative;
        }

        .studio-brand {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }

        #tvHeader {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

        .players-radar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .player-card {
            background: #1e293b;
            padding: 10px 5px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            color: var(--text-muted);
        }

        .player-card.active {
            color: white;
            background: linear-gradient(135deg, var(--accent-pink), #bc00dd);
            box-shadow: 0 0 15px rgba(255, 42, 116, 0.4);
            border-color: var(--accent-pink);
            transform: scale(1.05);
        }

        .player-card.done {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(0, 240, 255, 0.05);
        }

        #tvQuestion {
            font-size: 24px;
            line-height: 1.5;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 30px;
            min-height: 70px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn-option {
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-align: right;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-option:hover {
            border-color: var(--accent-blue);
            background: #243249;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            transform: translateY(-2px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 8, 15, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--accent-blue);
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
        }

        .modal-content h3 {
            color: var(--accent-blue);
            margin-top: 0;
            font-size: 22px;
        }

        .player-result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 16px;
        }

        .btn-next {
            background: linear-gradient(135deg, var(--accent-blue), #00a8ff);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            font-size: 16px;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-next:hover {
            box-shadow: 0 0 15px var(--accent-blue);
            transform: scale(1.02);
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            background: #1e293b;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        .rank-1 { border-left: 5px solid gold; color: gold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="studio-brand">BLUELIGHT GAMES STUDIO PRESENTS</div>
    <div id="tvHeader">جاري تحضير الخادم...</div>
    
    <div class="players-radar">
        <div id="pCard1" class="player-card active">اللاعب 1</div>
        <div id="pCard2" class="player-card">اللاعب 2</div>
        <div id="pCard3" class="player-card">اللاعب 3</div>
        <div id="pCard4" class="player-card">اللاعب 4</div>
    </div>

    <div id="tvQuestion">تحميل أول سؤال...</div>
    
    <div class="options-grid" id="buttonsContainer">
        <button class="btn-option" onclick="selectOption(0)"></button>
        <button class="btn-option" onclick="selectOption(1)"></button>
        <button class="btn-option" onclick="selectOption(2)"></button>
        <button class="btn-option" onclick="selectOption(3)"></button>
    </div>
</div>

<div id="resultModal" class="modal">
    <div class="modal-content">
        <h3>📊 تقرير جولة السؤال</h3>
        <div id="modalText"></div>
        <div style="margin-top: 15px; color: var(--correct); font-weight: bold;" id="correctAnswerReveal"></div>
        <button class="btn-next" onclick="nextQuestion()">تأكيد والانتقال للسؤال التالي ➡️</button>
    </div>
</div>

<script>
    // مصفوفة الـ 100 سؤال موزعة على 10 أقسام مختلفة كلياً (10 أسئلة لكل قسم)
    const qList = [
        // === القسم 1: تطوير ألعاب الرعب والمحركات (1 - 10) ===
        {category: "تطوير الألعاب والأنميشن", question: "ما هو المحرك الشهير المبني بـ C++ وتعد تقنية Nanite أحد ركائزه الرسومية؟", options: ["Unreal Engine 5", "Unity 6", "Godot", "CryEngine"], answer: "Unreal Engine 5"},
        {category: "تطوير الألعاب والأنميشن", question: "في محرك Unity، ما هو المكون (Component) المسؤول عن تتبع حركة الذكاء الاصطناعي للأعداء؟", options: ["NavMesh Agent", "RigidBody", "AudioSource", "Box Collider"], answer: "NavMesh Agent"},
        {category: "تطوير الألعاب والأنميشن", question: "ما اسم التقنية البرمجية المستخدمة في UE5 لمحاكاة الإضاءة الديناميكية المباشرة بالوقت الفعلي؟", options: ["Lumen", "Nanite", "Lightmapping", "RayTracing"], answer: "Lumen"},
        {category: "تطوير الألعاب والأنميشن", question: "أي لغة برمجة تعتبر اللغة الأساسية والمدعومة رسمياً للكتابة داخل Unity حالياً؟", options: ["C#", "C++", "Java", "Python"], answer: "C#"},
        {category: "تطوير الألعاب والأنميشن", question: "ماذا يسمى المستشعر البرمجي الذي يسمح للذكاء الاصطناعي بسماع خطوات أقدام اللاعب في ألعاب الرعب؟", options: ["Hearing/Noise Sensor", "Vision Cone", "Trigger Box", "Raycast"], answer: "Hearing/Noise Sensor"},
        {category: "تطوير الألعاب والأنميشن", question: "ما اسم نظام الإضاءة الحجمية وحساب الظلال الفيزيائية المتقدمة للضوء في الألعاب؟", options: ["Volumetric Lighting", "Ambient Occlusion", "Texture Mapping", "Baking"], answer: "Volumetric Lighting"},
        {category: "تطوير الألعاب والأنميشن", question: "ماذا تسمى عملية تقليل عدد المضلعات داخل مجسم ثلاثي الأبعاد لتسريع أدائه في اللعبة؟", options: ["Optimization", "Baking", "Rigging", "Texturing"], answer: "Optimization"},
        {category: "تطوير الألعاب والأنميشن", question: "ماذا نطلق على الهيكل العظمي الداخلي للمجسم ثلاثي الأبعاد المخصص لعمل حركات الإنميشن؟", options: ["Rigging / Skeleton", "Mesh", "Material", "Collider"], answer: "Rigging / Skeleton"},
        {category: "تطوير الألعاب والأنميشن", question: "ما هو المكون المسؤول عن إصدار الترددات الصوتية والمؤثرات داخل بيئة الألعاب في Unity؟", options: ["AudioSource", "AudioListener", "Microphone", "SoundCollider"], answer: "AudioSource"},
        {category: "تطوير الألعاب والأنميشن", question: "في صناعة الألعاب، ماذا يرمز الاختصار المشهور NPC؟", options: ["شخصية غير قابلة للعب", "شخصية اللاعب الرئيسية", "مركز معالجة الشبكة", "الوحش النهائي في المرحلة"], answer: "شخصية غير قابلة للعب"},

        // === القسم 2: برمجة الويب و JavaScript (11 - 20) ===
        {category: "برمجة وتطوير الويب", question: "ما هي المكتبة الشهيرة المبنية على WebGL وتسمح بعرض مجسمات 3D في المتصفح عبر JavaScript؟", options: ["Three.js", "React", "Bootstrap", "jQuery"], answer: "Three.js"},
        {category: "برمجة وتطوير الويب", question: "في صفحات الويب، ما هو الرمز (Tag) الأساسي المستخدم لتعريف فقرة نصية عادية؟", options: ["<p>", "<h1>", "<div>", "<a>"], answer: "<p>"},
        {category: "برمجة وتطوير الويب", question: "ما هي التقنية البرمجية المسؤولة عن تنسيق المظهر الخارجي، الألوان، والخطوط لملفات الويب؟", options: ["CSS", "HTML", "JSON", "SQL"], answer: "CSS"},
        {category: "برمجة وتطوير الويب", question: "ما هي البيئة التي تمكننا من تشغيل أكواد لغة JavaScript خارج المتصفح على السيرفر كـ Backend؟", options: ["Node.js", "Three.js", "HTML5", "Vercel"], answer: "Node.js"},
        {category: "برمجة وتطوير الويب", question: "ما اسم المنصة السحابية الشهيرة والأكثر استخداماً لاستضافة مواقع Frontend وتطبيقات Node.js مجاناً؟", options: ["Vercel", "GitHub", "Mediafire", "Termux"], answer: "Vercel"},
        {category: "برمجة وتطوير الويب", question: "في JavaScript، ما هي الكلمة المحجوزة المستخدمة لتعريف متغير يمكن تغيير قيمته لاحقاً؟", options: ["let", "const", "fixed", "define"], answer: "let"},
        {category: "برمجة وتطوير الويب", question: "في تطوير الويب، ماذا نطلق على واجهة المستخدم الأمامية التي يراها ويتفاعل معها الزائر مباشرة؟", options: ["Frontend", "Backend", "Database", "API"], answer: "Frontend"},
        {category: "برمجة وتطوير الويب", question: "ما هو الرمز المستخدم لعمل رابط تشعبي ينقل المستخدم لصفحة أخرى في HTML؟", options: ["<a>", "<img>", "<link>", "<p>"], answer: "<a>"},
        {category: "برمجة وتطوير الويب", question: "في لغة CSS، ما هو الخيار الصحيح لتغيير المسافة الداخلية للعنصر (بين المحتوى والإطار)؟", options: ["padding", "margin", "border", "width"], answer: "padding"},
        {category: "برمجة وتطوير الويب", question: "ما هو نوع المتغير البرمجي الذي لا يحمل سوى قيمتين فقط: إما صحيح (True) أو خاطئ (False)؟", options: ["Boolean", "Integer", "String", "Float"], answer: "Boolean"},

        // === القسم 3: هندسة الشبكات والأنظمة (21 - 30) ===
        {category: "هندسة الشبكات والأنظمة", question: "ما هي بنية الشبكات (Topology) التي ترتبط فيها كافة الأجهزة بنقطة أو جهاز مركزي (موزع)؟", options: ["Star Topology", "Bus Topology", "Ring Topology", "Mesh Topology"], answer: "Star Topology"},
        {category: "هندسة الشبكات والأنظمة", question: "ما هو البروتوكول الأساسي المسؤول عن نقل حزم البيانات وضمان ترابط طبقات الإنترنت؟", options: ["TCP/IP", "HTTP", "FTP", "DNS"], answer: "TCP/IP"},
        {category: "هندسة الشبكات والأنظمة", question: "ما هي توبولوجيا الشبكات التي تتصل بها الأجهزة واحداً تلو الآخر لتشكل مساراً دائرياً مغلقاً؟", options: ["Ring Topology", "Bus Topology", "Star Topology", "Tree Topology"], answer: "Ring Topology"},
        {category: "هندسة الشبكات والأنظمة", question: "ما هي بنية الشبكة التي تستخدم كابلاً رئيسياً واحداً تتفرع منه بقية الأجهزة؟", options: ["Bus Topology", "Star Topology", "Ring Topology", "Mesh Topology"], answer: "Bus Topology"},
        {category: "هندسة الشبكات والأنظمة", question: "في الشبكات، ماذا يرمز الاختصار المشهور IP؟", options: ["Internet Protocol", "Internal Process", "Information Pack", "Instant Port"], answer: "Internet Protocol"},
        {category: "هندسة الشبكات والأنظمة", question: "ما هو النظام المسؤول عن تحويل أسماء النطاقات (المواقع كـ google.com) إلى عناوين IP رقمية؟", options: ["DNS", "DHCP", "FTP", "SMTP"], answer: "DNS"},
        {category: "هندسة الشبكات والأنظمة", question: "ما هو الاختصار الذي يرمز لشبكة النطاق المحلي الصغير المحدود داخل منزل أو مكتب؟", options: ["LAN", "WAN", "MAN", "VPN"], answer: "LAN"},
        {category: "هندسة الشبكات والأنظمة", question: "ما اسم شبكة الويب العالمية الممتدة التي تربط الدول والقارات ببعضها؟", options: ["WAN", "LAN", "PAN", "SAN"], answer: "WAN"},
        {category: "هندسة الشبكات والأنظمة", question: "أي منفذ أو بروتوكول يعتبر النسخة الآمنة والمشفرة لتصفح المواقع الإلكترونية؟", options: ["HTTPS", "HTTP", "FTP", "Telnet"], answer: "HTTPS"},
        {category: "هندسة الشبكات والأنظمة", question: "ماذا يسمى العنوان الفيزيائي الفريد والمثبت بكرت الشبكة لكل جهاز ولا يتغير أبداً؟", options: ["MAC Address", "IP Address", "DNS Client", "URL Code"], answer: "MAC Address"},

        // === القسم 4: أنظمة التشغيل والتعديل البرمجي (31 - 40) ===
        {category: "الأنظمة والتعديل البرمجي", question: "ما اسم محاكي نظام لينكس وأسطر الأوامر المتقدم الذي يعمل على الهواتف بدون روت؟", options: ["Termux", "Kali Linux", "Ubuntu Mobile", "CMD Phone"], answer: "Termux"},
        {category: "الأنظمة والتعديل البرمجي", question: "ما هو نظام التعديل البرمجي الشهير لأجهزة PS4 الذي يمنح صلاحيات كاملة لتشغيل ألعاب المحاكاة؟", options: ["GoldHEN / Jailbreak", "Linux OS", "RetroArch", "Android Mod"], answer: "GoldHEN / Jailbreak"},
        {category: "الأنظمة والتعديل البرمجي", question: "أي توزيعة من نظام Linux تعتبر الأشهر ومخصصة بالكامل لعمليات اختبار الاختراق والأمن السيبراني؟", options: ["Kali Linux", "Ubuntu", "Fedora", "Mint"], answer: "Kali Linux"},
        {category: "الأنظمة والتعديل البرمجي", question: "ما هو النظام البرمجي المتكامل الذي يسمح بتشغيل ألعاب الكونسول القديمة ومحاكاتها على أجهزة مختلفة؟", options: ["RetroArch", "GoldHEN", "Termux", "Unity"], answer: "RetroArch"},
        {category: "الأنظمة والتعديل البرمجي", question: "في أجهزة الماكبوك، ما هو أحدث خط معالجات أبل فائقة القوة المصنعة بالذكاء الاصطناعي؟", options: ["Apple Silicon (M5)", "Intel Core i9", "AMD Ryzen 9", "Snapdragon X"], answer: "Apple Silicon (M5)"},
        {category: "الأنظمة والتعديل البرمجي", question: "ما اسم نظام تشغيل الهواتف الذكية المملوك لشركة جوجل؟", options: ["Android", "iOS", "Windows Mobile", "Symbian"], answer: "Android"},
        {category: "الأنظمة والتعديل البرمجي", question: "ما اسم نظام تشغيل الحواسب الشخصية الأوسع انتشاراً من شركة مايكروسوفت؟", options: ["Windows", "macOS", "Linux", "ChromeOS"], answer: "Windows"},
        {category: "الأنظمة والتعديل البرمجي", question: "ماذا يسمى الجدار البرمجي أو العتادي الذي يحمي الشبكة من الاختراقات والاتصالات الخبيثة؟", options: ["Firewall (جدار الحماية)", "Router", "Switch", "Server"], answer: "Firewall (جدار الحماية)"},
        {category: "الأنظمة والتعديل البرمجي", question: "ما هي الذاكرة العشوائية المؤقتة في الحاسوب التي تفقد محتواها بالكامل بمجرد فصل الكهرباء؟", options: ["RAM", "ROM", "SSD", "BIOS"], answer: "RAM"},
        {category: "الأنظمة والتعديل البرمجي", question: "ما هي وحدة التخزين الحديثة والسريعة جداً مقارنة بالهاردات التقليدية HDD؟", options: ["SSD", "RAM", "Floppy Disk", "CD-ROM"], answer: "SSD"},

        // === القسم 5: الرياضيات والهندسة (41 - 50) ===
        {category: "الرياضيات والهندسة", question: "ما هي النظرية الهندسية المستخدمة لحساب أطوال أضلاع المثلث القائم الزاوية؟", options: ["مبرهنة فيثاغورس", "مبرهنة طاليس", "قانون الجيب", "قانون نيوتن"], answer: "مبرهنة فيثاغورس"},
        {category: "الرياضيات والهندسة", question: "كم يساوي مجموع زوايا أي مثلث في الهندسة المستوية الإقليدية؟", options: ["180 درجة", "90 درجة", "360 درجة", "120 درجة"], answer: "180 درجة"},
        {category: "الرياضيات والهندسة", question: "في مبرهنة طاليس، نستخدم نسب الأضلاع عند وجود خطوط متوازية لحساب ماذا؟", options: ["الأطوال والمسافات", "المساحات الكلية", "الزوايا الحادة", "حجم المجسمات"], answer: "الأطوال والمسافات"},
        {category: "الرياضيات والهندسة", question: "ما هو الكسر المساوي لنصف العدد 100 في الرياضيات؟", options: ["50", "25", "10", "75"], answer: "50"},
        {category: "الرياضيات والهندسة", question: "ما هو العدد الأولي من بين الأعداد التالية؟", options: ["7", "4", "9", "12"], answer: "7"},
        {category: "الرياضيات والهندسة", question: "ما هو قياس الزاوية القائمة بالدرجات؟", options: ["90 درجة", "45 درجة", "180 درجة", "360 درجة"], answer: "90 درجة"},
        {category: "الرياضيات والهندسة", question: "ما هو ناتج ضرب العدد 7 في العدد 8؟", options: ["56", "54", "64", "49"], answer: "56"},
        {category: "الرياضيات والهندسة", question: "ماذا يسمى المضلع الهندسي الذي يتكون من 5 أضلاع؟", options: ["خماسي الأضلاع", "رباعي الأضلاع", "سداسي الأضلاع", "مثلث"], answer: "خماسي الأضلاع"},
        {category: "الرياضيات والهندسة", question: "ما هو الجذر التربيعي للعدد 64؟", options: ["8", "6", "7", "9"], answer: "8"},
        {category: "الرياضيات والهندسة", question: "ما هو قانون حساب مساحة المستطيل؟", options: ["الطول × العرض", "الطول + العرض", "الضلع × 4", "نصف القاعدة × الارتفاع"], answer: "الطول × العرض"},

        // === القسم 6: علم الأحياء وطب جراحة القلب (51 - 60) ===
        {category: "الأحياء وجراحة القلب", question: "أي عضو رئيسي في جسم الإنسان يحتوي على صمامات وشرايين تاجية ومسؤول عن ضخ الدم؟", options: ["القلب", "الكبد", "الرئتين", "الدماغ"], answer: "القلب"},

        {category: "المطبخ والثقافة المغربية", question: "وجبة مغربية وطنية عريقة تُحضر يوم الجمعة بسبع خضار ودقيق القمح المستدير:", options: ["الكسكس", "الرفيسة", "البسطيلة", "الحريرة"], answer: "الكسكس"},

        {category: "المطبخ والثقافة المغربية", question: "ما اسم الزيت النادر والفاخر المستخرج من أشجار تنمو فقط في جنوب المغرب واستخدم للتجميل والطبخ؟", options: ["زيت الأركان", "زيت الزيتون", "زيت اللوز", "زيت السمسم"], answer: "زيت الأركان"},
        {category: "المطبخ والثقافة المغربية", question: "ما هي أقدم جامعة مستمرة في العالم وتوجد في مدينة فاس المغربية وبنتها فاطمة الفهرية؟", options: ["جامعة القرويين", "جامعة الأزهر", "جامعة أكسفورد", "جامعة بولونيا"], answer: "جامعة القرويين"},
        {category: "المطبخ والثقافة المغربية", question: "ما هو نوع الصناعة التقليدية الفخارية المعتمدة على الفسيفساء الطينية الملونة التي تشتهر بها فاس وسلا؟", options: ["الزليج المغربي", "النحاسيات", "النقش على الخشب", "صناعة الجلود"], answer: "الزليج المغربي"}
    ];

    let currentQIndex = 0;
    let currentPlayer = 1;
    let playerAnswers = {}; 
    let playerScores = {1: 0, 2: 0, 3: 0, 4: 0};

    const tvHeader = document.getElementById('tvHeader');
    const tvQuestion = document.getElementById('tvQuestion');
    const buttons = document.querySelectorAll('.btn-option');
    const modal = document.getElementById('resultModal');
    const modalText = document.getElementById('modalText');
    const correctAnswerReveal = document.getElementById('correctAnswerReveal');

    function updateQuiz() {
        if (currentQIndex < qList.length) {
            let qData = qList[currentQIndex];
            
            tvHeader.innerText = `السؤال الحالي: ${currentQIndex + 1} من أصل ${qList.length} | القسم: [ ${qData.category} ]`;
            tvQuestion.innerText = qData.question;
            
            for (let i = 0; i < 4; i++) {
                buttons[i].innerText = qData.options[i];
            }
            
            updatePlayerCards();
        } else {
            showFinalLeaderboard();
        }
    }

    function updatePlayerCards() {
        for (let p = 1; p <= 4; p++) {
            let card = document.getElementById(`pCard${p}`);
            card.className = "player-card"; 
            
            if (p === currentPlayer) {
                card.classList.add("active");
            } else if (playerAnswers[p] !== undefined) {
                card.classList.add("done");
            }
        }
    }

    function selectOption(btnIdx) {
        let selectedText = buttons[btnIdx].innerText;
        playerAnswers[currentPlayer] = selectedText;

        if (currentPlayer < 4) {
            currentPlayer++;
            updateQuiz();
        } else {
            evaluateRoundAnswers();
        }
    }

    function evaluateRoundAnswers() {
        let qData = qList[currentQIndex];
        let correctAnswer = qData.answer;
        let reportHtml = "";

        for (let p = 1; p <= 4; p++) {
            let statusIcon = "❌";
            if (playerAnswers[p] === correctAnswer) {
                playerScores[p]++; 
                statusIcon = "✅";
            }
            reportHtml += `
                <div class="player-result-row">
                    <span>👤 اللاعب ${p}</span>
                    <span>اختياره: ${playerAnswers[p]} (${statusIcon})</span>
                </div>
            `;
        }

        modalText.innerHTML = reportHtml;
        correctAnswerReveal.innerText = `💡 الإجابة الصحيحة هي: ${correctAnswer}`;
        modal.style.display = "flex";
    }

    function nextQuestion() {
        modal.style.display = "none";
        currentPlayer = 1;
        playerAnswers = {};
        currentQIndex++;
        updateQuiz();
    }

    function showFinalLeaderboard() {
        tvHeader.style.display = 'none';
        document.querySelector('.players-radar').style.display = 'none';
        document.getElementById('buttonsContainer').style.display = 'none';
        
        let sortedPlayers = Object.keys(playerScores).map(p => {
            return { id: p, score: playerScores[p] };
        }).sort((a, b) => b.score - a.score);

        let winPlayer = sortedPlayers[0].id;
        tvQuestion.innerHTML = `👑 الفائز بلقب البطولة هو اللاعب رقم [ ${winPlayer} ]!<br><br>النتائج الختامية للمواجهة:`;
        
        let leaderboardHtml = "";
        sortedPlayers.forEach((p, idx) => {
            let rankClass = idx === 0 ? "rank-1" : "";
            leaderboardHtml += `
                <div class="leaderboard-row ${rankClass}">
                    <span>الترتيب ${idx + 1}: اللاعب ${p.id}</span>
                    <span>${p.score} نقطة</span>
                </div>
            `;
        });
        
        tvQuestion.innerHTML += leaderboardHtml;
    }

    updateQuiz();
</script>
