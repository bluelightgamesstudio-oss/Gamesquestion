<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Quiz - 10 Pure Categories</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --card-bg: #131a26;
            --accent-pink: #ff2a74;
            --accent-blue: #00f0ff;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --correct: #00ff87;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .quiz-container {
            background-color: var(--card-bg);
            border: 2px solid #1e293b;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            padding: 30px;
            width: 100%;
            max-width: 650px;
            text-align: center;
            position: relative;
        }

        .studio-brand {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }

        #tvHeader {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

        .players-radar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .player-card {
            background: #1e293b;
            padding: 10px 5px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            color: var(--text-muted);
        }

        .player-card.active {
            color: white;
            background: linear-gradient(135deg, var(--accent-pink), #bc00dd);
            box-shadow: 0 0 15px rgba(255, 42, 116, 0.4);
            border-color: var(--accent-pink);
            transform: scale(1.05);
        }

        .player-card.done {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(0, 240, 255, 0.05);
        }

        #tvQuestion {
            font-size: 24px;
            line-height: 1.5;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 30px;
            min-height: 70px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn-option {
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-align: right;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-option:hover {
            border-color: var(--accent-blue);
            background: #243249;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            transform: translateY(-2px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 8, 15, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--accent-blue);
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
        }

        .modal-content h3 {
            color: var(--accent-blue);
            margin-top: 0;
            font-size: 22px;
        }

        .player-result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 16px;
        }

        .btn-next {
            background: linear-gradient(135deg, var(--accent-blue), #00a8ff);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            font-size: 16px;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-next:hover {
            box-shadow: 0 0 15px var(--accent-blue);
            transform: scale(1.02);
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            background: #1e293b;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        .rank-1 { border-left: 5px solid gold; color: gold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="studio-brand">BLUELIGHT GAMES STUDIO PRESENTS</div>
    <div id="tvHeader">جاري تحضير الخادم...</div>
    
    <div class="players-radar">
        <div id="pCard1" class="player-card active">اللاعب 1</div>
        <div id="pCard2" class="player-card">اللاعب 2</div>
        <div id="pCard3" class="player-card">اللاعب 3</div>
        <div id="pCard4" class="player-card">اللاعب 4</div>
    </div>

    <div id="tvQuestion">تحميل أول سؤال...</div>
    
    <div class="options-grid" id="buttonsContainer">
        <button class="btn-option" onclick="selectOption(0)"></button>
        <button class="btn-option" onclick="selectOption(1)"></button>
        <button class="btn-option" onclick="selectOption(2)"></button>
        <button class="btn-option" onclick="selectOption(3)"></button>
    </div>
</div>

<div id="resultModal" class="modal">
    <div class="modal-content">
        <h3>📊 تقرير جولة السؤال</h3>
        <div id="modalText"></div>
        <div style="margin-top: 15px; color: var(--correct); font-weight: bold;" id="correctAnswerReveal"></div>
        <button class="btn-next" onclick="nextQuestion()">تأكيد والانتقال للسؤال التالي ➡️</button>
    </div>
</div>

<script>
    // مصفوفة الـ 100 سؤال الموزعة على 10 أقسام منفصلة تماماً وممنوعة من التكرار والتداخل
    const qList = [
        // === القسم 1: التكنولوجيا وعلم الذكاء الاصطناعي (1 - 10) ===
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "ما هو اسم نموذج الذكاء الاصطناعي التوليدي الشهير الذي طورته شركة OpenAI وأحدث ثورة عالمية؟", options: ["ChatGPT", "Gemini", "Claude", "Midjourney"], answer: "ChatGPT"},
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "ماذا يطلق على التقنية التي تسمح بتخزين ومعالجة البيانات على خوادم بعيدة عبر الإنترنت بدلاً من القرص الصلب؟", options: ["الحوسبة السحابية", "التشفير الرقمي", "الواقع الافتراضي", "البلوكشين"], answer: "الحوسبة السحابية"},
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "ما هي التقنية التي تقوم عليها العملات الرقمية مثل البيتكوين لضمان الأمان واللامركزية؟", options: ["البلوكشين (سلسلة الكتل)", "الذكاء الاصطناعي", "الإنترنت الفضائي", "شاشات الكريستال"], answer: "البلوكشين (سلسلة الكتل)"},
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "ماذا يسمى المساعد الذكي الصوتي الافتراضي المطور بالكامل من قِبل شركة Apple؟", options: ["Siri", "Alexa", "Cortana", "Google Assistant"], answer: "Siri"},
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "ما هو المصطلح التقني الذي يعني ربط الأجهزة المنزلية واليومية بشبكة الإنترنت للتحكم بها عن بُعد؟", options: ["إنترنت الأشياء (IoT)", "الذكاء الاصطناعي الفائق", "الحوسبة الكمية", "الواقع المعزز"], answer: "إنترنت الأشياء (IoT)"},
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "أي شركة تكنولوجية عملاقة قامت بتطوير نظام التشغيل الشهير أندرويد للهواتف الذكية؟", options: ["جوجل", "مايكروسوفت", "أبل", "سامسونج"], answer: "جوجل"},
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "ماذا يسمى الجيل الخامس الجديد من شبكات الاتصال الخلوية التي توفر سرعات تحميل فائقة جداً؟", options: ["5G", "4G LTE", "Fiber Optic", "Wi-Fi 6"], answer: "5G"},
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "ما هو المحرك البحثي الأكثر استخداماً وانتشاراً على شبكة الإنترنت عالمياً؟", options: ["Google", "Bing", "Yahoo", "DuckDuckGo"], answer: "Google"},
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "ما اسم المنصة العالمية الشهيرة المخصصة لمشاركة مقاطع الفيديو والتي تمتلكها شركة ألفابت (جوجل)؟", options: ["YouTube", "Facebook", "Vimeo", "DailyMotion"], answer: "YouTube"},
        {category: "التكنولوجيا والذكاء الاصطناعي", question: "أي مما يلي يعتبر وحدة المعالجة المركزية التي تمثل 'عقل' الحاسوب والمسؤولة عن تنفيذ العمليات؟", options: ["CPU", "RAM", "Hard Disk", "Power Supply"], answer: "CPU"},

        // === القسم 2: العلوم والفيزياء الطبيعية (11 - 20) ===
        {category: "العلوم والفيزياء الطبيعية", question: "ما هو الغاز الأساسي الذي يمثل النسبة الأكبر في الغلاف الجوي للأرض؟", options: ["النيتروجين", "الأكسجين", "الهيدروجين", "الأوزون"], answer: "النيتروجين"},
        {category: "العلوم والفيزياء الطبيعية", question: "ما هو الكوكب الأقرب إلى الشمس في مجموعتنا الشمسية؟", options: ["عطارد", "الزهرة", "المريخ", "المشتري"], answer: "عطارد"},
        {category: "العلوم والفيزياء الطبيعية", question: "ما هي السرعة التقريبية للضوء في الفراغ؟", options: ["300 ألف كم/ثانية", "150 ألف كم/ثانية", "500 ألف كم/ثانية", "100 ألف كم/ثانية"], answer: "300 ألف كم/ثانية"},
        {category: "العلوم والفيزياء الطبيعية", question: "ما هو المعدن السائل الوحيد في درجات الحرارة العادية؟", options: ["الزئبق", "الحديد", "النحاس", "الألومنيوم"], answer: "الزئبق"},
        {category: "العلوم والفيزياء الطبيعية", question: "ما هو الغاز الطبيعي الذي يمتصه النبات أثناء عملية البناء الضوئي؟", options: ["ثاني أكسيد الكربون", "النيتروجين", "الهيدروجين", "الأرجون"], answer: "ثاني أكسيد الكربون"},
        {category: "العلوم والفيزياء الطبيعية", question: "ما هو الرمز الكيميائي لعنصر الملح الشائع (ملح الطعام)؟", options: ["NaCl", "H2O", "CO2", "HCl"], answer: "NaCl"},
        {category: "العلوم والفيزياء الطبيعية", question: "من هو العالم الشهير الذي صاغ قانون الجاذبية العام بعد سقوط التفاحة؟", options: ["إسحاق نيوتن", "ألبيرت أينشتاين", "غاليليو غاليلي", "توماس أديسون"], answer: "إسحاق نيوتن"},
        {category: "العلوم والفيزياء الطبيعية", question: "ما هو أصلب عنصر طبيعي على وجه الأرض ويستخدم في قطع المعادن والمجوهرات؟", options: ["الألماس", "الذهب", "الحديد", "البلاتين"], answer: "الألماس"},
        {category: "العلوم والفيزياء الطبيعية", question: "أي كوكب في مجموعتنا الشمسية يشتهر بلونه الأحمر لوجود أكسيد الحديد على سطحه؟", options: ["المريخ", "زحل", "نبتون", "المشتري"], answer: "المريخ"},
        {category: "العلوم والفيزياء الطبيعية", question: "ما هي القوة التي تقاوم حركة الأجسام عند احتكاكها ببعضها البعض؟", options: ["قوة الاحتكاك", "قوة الجاذبية", "القوة المغناطيسية", "قوة الطرد المركزي"], answer: "قوة الاحتكاك"},

        // === القسم 3: جراحة القلب وعلم الأحياء (21 - 30) ===
        {category: "الأحياء وجراحة القلب", question: "أي عضو رئيسي في جسم الإنسان يحتوي على صمامات وشرايين تاجية ومسؤول عن ضخ الدم؟", options: ["القلب", "الكبد", "الرئتين", "الدماغ"], answer: "القلب"},
        {category: "الأحياء وجراحة القلب", question: "ما هو اسم الشريان الأكبر والأضخم في جسم الإنسان والذي يخرج مباشرة من القلب؟", options: ["الشريان الأبهر (الأورطي)", "الشريان الرئوي", "الشريان السباتي", "الوريد الأجوف"], answer: "الشريان الأبهر (الأورطي)"},
        {category: "الأحياء وجراحة القلب", question: "كم عدد حجرات قلب الإنسان البالغ؟", options: ["أربع حجرات", "حجرتان", "ثلاث حجرات", "خمس حجرات"], answer: "أربع حجرات"},
        {category: "الأحياء وجراحة القلب", question: "ماذا يسمى الطبيب الجراح المتخصص في إصلاح صمامات القلب المعتلة وإجراء عمليات قلب مفتوح؟", options: ["جراح القلب والأوعية", "طبيب الأعصاب", "جراح العظام", "طبيب العيون"], answer: "جراح القلب والأوعية"},
        {category: "الأحياء وجراحة القلب", question: "ما هو العضو المسؤول عن تصفية الدم وإخراج الفضلات والسوائل الزائدة على شكل بول؟", options: ["الكلية", "المعدة", "الطحال", "البنكرياس"], answer: "الكلية"},
        {category: "الأحياء وجراحة القلب", question: "ما هي فصيلة الدم التي تُعرف بـ 'المستقبل العام' لأنها تستقبل من جميع الفصائل؟", options: ["AB+", "O-", "A+", "B-"], answer: "AB+"},
        {category: "الأحياء وجراحة القلب", question: "كم عدد العظام في جسم الإنسان البالغ؟", options: ["206 عظمة", "300 عظمة", "150 عظمة", "250 عظمة"], answer: "206 عظمة"},
        {category: "الأحياء وجراحة القلب", question: "أي نوع من الخلايا في دم الإنسان مسؤول عن محاربة الأمراض والميكروبات؟", options: ["خلايا الدم البيضاء", "خلايا الدم الحمراء", "الصفائح الدموية", "البلازما"], answer: "خلايا الدم البيضاء"},
        {category: "الأحياء وجراحة القلب", question: "ما هي الوحدة الأساسية والتركيبية لبناء الكائنات الحية؟", options: ["الخلية", "الذرة", "الجزيء", "النسيج"], answer: "الخلية"},
        {category: "الأحياء وجراحة القلب", question: "ما هو الصمام الذي يفصل بين الأذين الأيسر والبطين الأيسر في قلب الإنسان؟", options: ["الصمام المترالي (التاجي)", "الصمام ثلاثي الشرفات", "الصمام الأورطي", "الصمام الرئوي"], answer: "الصمام المترالي (التاجي)"},

        // === القسم 4: الهندسة والرياضيات (31 - 40) ===
        {category: "الهندسة والرياضيات", question: "ما هي النظرية الهندسية المستخدمة لحساب أطوال أضلاع المثلث القائم الزاوية؟", options: ["مبرهنة فيثاغورس", "مبرهنة طاليس", "قانون الجيب", "قانون نيوتن"], answer: "مبرهنة فيثاغورس"},
        {category: "الهندسة والرياضيات", question: "كم يساوي مجموع زوايا أي مثلث في الهندسة المستوية الإقليدية؟", options: ["180 درجة", "90 درجة", "360 درجة", "120 درجة"], answer: "180 درجة"},
        {category: "الهندسة والرياضيات", question: "في مبرهنة طاليس، نستخدم نسب الأضلاع عند وجود خطوط متوازية لحساب ماذا؟", options: ["الأطوال والمسافات", "المساحات الكلية", "الزوايا الحادة", "حجم المجسمات"], answer: "الأطوال والمسافات"},
        {category: "الهندسة والرياضيات", question: "ما هو قياس الزاوية القائمة بالدرجات؟", options: ["90 درجة", "45 درجة", "180 درجة", "360 درجة"], answer: "90 درجة"},
        {category: "الهندسة والرياضيات", question: "ما هو العدد الأولي من بين الأعداد التالية؟", options: ["7", "4", "9", "12"], answer: "7"},
        {category: "الهندسة والرياضيات", question: "ما هو ناتج ضرب العدد 7 في العدد 8؟", options: ["56", "54", "64", "49"], answer: "56"},
        {category: "الهندسة والرياضيات", question: "ما هو الجذر التربيعي للعدد 64؟", options: ["8", "6", "7", "9"], answer: "8"},
        {category: "الهندسة والرياضيات", question: "ما هو قانون حساب مساحة المستطيل الأساسي؟", options: ["الطول × العرض", "الطول + العرض", "الضلع × 4", "نصف القاعدة × الارتفاع"], answer: "الطول × العرض"},
        {category: "الهندسة والرياضيات", question: "ما هو ناتج قسمة العدد 100 على 4؟", options: ["25", "50", "20", "10"], answer: "25"},
        {category: "الهندسة والرياضيات", question: "ماذا يسمى الخط المستقيم الذي يصل بين نقطتين على الدائرة ويمر بمركزها؟", options: ["القطر", "نصف القطر", "الوتر", "المماس"], answer: "القطر"},

        // === القسم 5: الجغرافيا العالمية (41 - 50) ===
        {category: "الجغرافيا العالمية", question: "ما هي العاصمة الحالية لدولة إيطاليا والتي تشتهر بمعلم الكولوسيوم التاريخي؟", options: ["روما", "ميلان", "باريس", "لندن"], answer: "روما"},
        {category: "الجغرافيا العالمية", question: "ما هي عاصمة المملكة المتحدة (بريطانيا) وتعتبر وجهة الضباب الشهيرة؟", options: ["لندن", "مانشستر", "برمنغهام", "أكسفورد"], answer: "لندن"},
        {category: "الجغرافيا العالمية", question: "ما هي أكبر قارة في العالم من حيث المساحة الكلية وعدد السكان؟", options: ["آسيا", "أفريقيا", "أوروبا", "أمريكا الشمالية"], answer: "آسيا"},
        {category: "الجغرافيا العالمية", question: "أي محيط يعتبر الأكبر والأعمق على وجه الأرض؟", options: ["المحيط الهادئ", "المحيط الأطلسي", "المحيط الهندي", "المحيط المتجمد الشمالي"], answer: "المحيط الهادئ"},
        {category: "الجغرافيا العالمية", question: "ما النهر الذي يعتبر الأطول في العالم ويقع في القارة الأفريقية؟", options: ["نهر النيل", "نهر الأمازون", "نهر الميسيسيبي", "نهر اليانغتسي"], answer: "نهر النيل"},

    let currentQIndex = 0;

    let playerScores = {1: 0, 2: 0, 3: 0, 4: 0};

    const tvHeader = document.getElementById('tvHeader');
    const tvQuestion = document.getElementById('tvQuestion');
    const buttons = document.querySelectorAll('.btn-option');
    const modal = document.getElementById('resultModal');
    const modalText = document.getElementById('modalText');
    const correctAnswerReveal = document.getElementById('correctAnswerReveal');

    function updateQuiz() {
        if (currentQIndex < qList.length) {
            let qData = qList[currentQIndex];
            
            tvHeader.innerText = `السؤال الحالي: ${currentQIndex + 1} من أصل ${qList.length} | القسم: [ ${qData.category} ]`;
            tvQuestion.innerText = qData.question;
            
            for (let i = 0; i < 4; i++) {
                buttons[i].innerText = qData.options[i];
            }
            
            updatePlayerCards();
        } else {
            showFinalLeaderboard();
        }
    }

    function updatePlayerCards() {
        for (let p = 1; p <= 4; p++) {
            let card = document.getElementById(`pCard${p}`);
            card.className = "player-card"; 
            
            if (p === currentPlayer) {
                card.classList.add("active");
            } else if (playerAnswers[p] !== undefined) {
                card.classList.add("done");
            }
        }
    }

    function selectOption(btnIdx) {
        let selectedText = buttons[btnIdx].innerText;
        playerAnswers[currentPlayer] = selectedText;

        if (currentPlayer < 4) {
            currentPlayer++;
            updateQuiz();
        } else {
            evaluateRoundAnswers();
        }
    }

    function evaluateRoundAnswers() {
        let qData = qList[currentQIndex];
        let correctAnswer = qData.answer;
        let reportHtml = "";

        for (let p = 1; p <= 4; p++) {
            let statusIcon = "❌";
            if (playerAnswers[p] === correctAnswer) {
                playerScores[p]++; 
                statusIcon = "✅";
            }
            reportHtml += `
                <div class="player-result-row">
                    <span>👤 اللاعب ${p}</span>
                    <span>اختياره: ${playerAnswers[p]} (${statusIcon})</span>
                </div>
            `;
        }

        modalText.innerHTML = reportHtml;
        correctAnswerReveal.innerText = `💡 الإجابة الصحيحة هي: ${correctAnswer}`;
        modal.style.display = "flex";
    }

    function nextQuestion() {
        modal.style.display = "none";
        currentPlayer = 1;
        playerAnswers = {};
        currentQIndex++;
        updateQuiz();
    }

        document.querySelector('.players-radar').style.display = 'none';
        document.getElementById('buttonsContainer').style.display = 'none';
        
        let sortedPlayers = Object.keys(playerScores).map(p => {
            return { id: p, score: playerScores[p] };
        }).sort((a, b) => b.score - a.score);

        let winPlayer = sortedPlayers[0].id;
        tvQuestion.innerHTML = `👑 الفائز بلقب البطولة هو اللاعب رقم [ ${winPlayer} ]!<br><br>النتائج الختامية للمواجهة:`;
        
        let leaderboardHtml = "";
        sortedPlayers.forEach((p, idx) => {
            let rankClass = idx === 0 ? "rank-1" : "";
            leaderboardHtml += `
                <div class="leaderboard-row ${rankClass}">
                    <span>الترتيب ${idx + 1}: اللاعب ${p.id}</span>
                    <span>${p.score} نقطة</span>
                </div>
            `;
        });
        
        tvQuestion.innerHTML += leaderboardHtml;
    }

    updateQuiz();
</script>

</body>
</html>
